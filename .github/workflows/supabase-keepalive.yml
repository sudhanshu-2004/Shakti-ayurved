name: Supabase Keep-Alive

# Runs every 4 days at 06:00 UTC to prevent Supabase free-tier from pausing
on:
  schedule:
    - cron: '0 6 */4 * *'   # every 4 days at 06:00 UTC
  workflow_dispatch:          # allow manual trigger from GitHub Actions UI

jobs:
  ping-supabase:
    name: Ping Supabase to prevent pause
    runs-on: ubuntu-latest

    steps:
      - name: Send keep-alive request to Supabase
        run: |
          echo "Pinging Supabase at $(date)"

          # Perform a lightweight REST call — just queries the health endpoint
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "HTTP response: $RESPONSE"

          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 400 ]; then
            echo "✅ Supabase is alive and responding."
          else
            echo "⚠️  Unexpected response code: $RESPONSE"
            exit 1
          fi
